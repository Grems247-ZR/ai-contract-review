<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>合同陷阱检测器 - 看看你的合同有多少坑？</title>
<meta name="description" content="免费合同风险检测 - AI自动扫描合同中的隐藏陷阱。粘贴任意合同条款，立即查看风险数量。">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.container{max-width:700px;margin:0 auto;padding:20px}
.header{text-align:center;padding:40px 20px 30px}
.header h1{font-size:2.2em;background:linear-gradient(135deg,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
.header p{color:#94a3b8;font-size:1.1em}
.scan-box{background:#1e293b;border-radius:16px;padding:30px;box-shadow:0 4px 30px rgba(239,68,68,0.15)}
textarea{width:100%;height:200px;background:#0f172a;border:2px solid #334155;border-radius:12px;padding:16px;color:#e2e8f0;font-size:15px;resize:vertical;font-family:inherit;transition:border-color .3s}
textarea:focus{outline:none;border-color:#ef4444}
textarea::placeholder{color:#64748b}
.btn{display:block;width:100%;padding:16px;background:linear-gradient(135deg,#ef4444,#f59e0b);color:white;border:none;border-radius:12px;font-size:1.2em;font-weight:bold;cursor:pointer;margin-top:16px;transition:transform .2s,box-shadow .2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(239,68,68,0.3)}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.result{display:none;margin-top:24px;background:#1e293b;border-radius:16px;padding:24px;text-align:center}
.score{font-size:3em;font-weight:bold;margin:10px 0}
.score.danger{color:#ef4444}.score.warning{color:#f59e0b}.score.safe{color:#22c55e}
.traps{text-align:left;margin-top:16px}
.trap{padding:12px;background:#0f172a;border-radius:8px;margin-bottom:8px;border-left:3px solid #ef4444}
.trap .label{color:#94a3b8;font-size:.85em}
.trap .text{color:#e2e8f0;margin-top:4px}
.cta{margin-top:24px;padding:20px;background:linear-gradient(135deg,#7c3aed,#a855f7);border-radius:12px;text-align:center}
.cta h3{color:white;margin-bottom:8px}
.cta p{color:#c4b5fd;font-size:.9em;margin-bottom:12px}
.cta a{display:inline-block;padding:12px 32px;background:white;color:#7c3aed;border-radius:50px;font-weight:bold;text-decoration:none;font-size:1.05em}
.countdown{display:inline-block;background:#ef4444;color:white;padding:4px 12px;border-radius:20px;font-size:.85em;margin-left:8px;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.share-btns{margin-top:16px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.share-btn{padding:10px 20px;border-radius:8px;border:none;color:white;font-weight:bold;cursor:pointer;font-size:.9em}
.share-btn.twitter{background:#1d9bf0}.share-btn.copy{background:#475569}
.free-badge{display:inline-block;background:#22c55e;color:white;padding:4px 12px;border-radius:20px;font-size:.85em}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>🔍 合同陷阱检测器</h1>
<p>AI自动扫描，看看你的合同有多少隐藏风险 <span class="free-badge">免费</span></p>
</div>

<div class="scan-box">
<textarea id="contract" placeholder="在此粘贴合同条款或任意文本...
例如：
第一条：乙方在离职后5年内不得从事与本行业相关的任何工作，否则赔偿甲方违约金100万元。
第二条：甲方有权根据经营需要单方面调整乙方的薪酬待遇。
第三条：乙方自愿放弃社保缴纳。
第四条：本合同最终解释权归甲方所有。"></textarea>
<button class="btn" onclick="scan()">🔍 扫描风险条款</button>
</div>

<div class="result" id="result">
<div id="resultContent"></div>
</div>

<div class="share-btns" id="shareBtns" style="display:none">
<button class="share-btn copy" onclick="copyResult()">📋 复制结果分享</button>
</div>

<div class="cta" id="cta" style="display:none">
<h3>⚡ 需要完整审查报告？</h3>
<p>包括详细条款分析、修改建议和合规评估</p>
<a href="https://affix-ignore-alive.ngrok-free.dev" target="_blank">免费获取完整报告 →</a>
<p style="color:#c4b5fd;font-size:.8em;margin-top:8px">每日3次免费 · 终身会员¥99</p>
</div>
</div>

<script>
const TRAP_PATTERNS = [
  {regex: /竞业.*?(?:年|月).*?(?:赔偿|违约|补偿)/g, label: '⚠️ 竞业限制陷阱', desc: '竞业限制范围和补偿可能不合理'},
  {regex: /单方面|单方.*?(?:解除|变更|调整|修改)/g, label: '⚠️ 单方权利条款', desc: '对方保留了单方面修改合同的权力'},
  {regex: /放弃.*?(?:权利|社保|索赔|起诉|仲裁)/g, label: '🚨 权利放弃条款', desc: '诱导放弃法定权利，可能无效或不利'},
  {regex: /最终解释权.*?(?:归|属于)/g, label: '⚠️ 最终解释权条款', desc: '格式条款中的单方解释权'},
  {regex: /违约金.*?(?:[5-9]\d{3,}|[1-9]\d{4,}|万|百万)/g, label: '🚨 高额违约金', desc: '违约金金额可能过高'},
  {regex: /自动.*?(?:续期|续约|延期|扣款)/g, label: '⚠️ 自动续约条款', desc: '可能在不知情的情况下自动续约'},
  {regex: /不.*?(?:承担|负责|赔偿).*?(?:责任|损失|后果)/g, label: '⚠️ 免责条款', desc: '对方过度免除自身责任'},
  {regex: /保密.*?(?:永久|无限|终身)/g, label: '⚠️ 永久保密义务', desc: '保密期限过长，可能不合理'},
  {regex: /管辖.*?(?:方所在地|甲方.*?法院)/g, label: '⚠️ 管辖地不公', desc: '争议解决地点对对方有利'},
  {regex: /押金|保证金|定金.*?(?:不退|扣除|没收)/g, label: '🚨 押金/定金风险', desc: '押金或定金退还条件苛刻'},
  {regex: /口头|电话.*?(?:通知|告知).*?(?:变更|解除|终止)/g, label: '⚠️ 口头通知条款', desc: '允许口头通知重大变更，缺乏书面记录'},
  {regex: /概不.*?(?:负责|承担|赔偿)/g, label: '⚠️ 概不负责条款', desc: '过度免除责任'},
  {regex: /任意.*?(?:解除|终止|变更)/g, label: '🚨 任意解除权', desc: '赋予单方任意解除合同的权力'}
];

function scan() {
  const text = document.getElementById('contract').value.trim();
  if (text.length < 10) {
    alert('请粘贴更多合同内容（至少10个字）');
    return;
  }

  const found = [];
  TRAP_PATTERNS.forEach(pattern => {
    const matches = text.match(pattern.regex);
    if (matches) {
      found.push({
        label: pattern.label,
        desc: pattern.desc,
        matches: [...new Set(matches)]
      });
    }
  });

  const score = Math.min(found.length * 8 + Math.floor(Math.random() * 5), 100);
  let level, colorClass;
  if (score >= 60) { level = '高风险 ⚠️'; colorClass = 'danger'; }
  else if (score >= 30) { level = '中等风险'; colorClass = 'warning'; }
  else { level = '低风险'; colorClass = 'safe'; }

  let html = `<h2 style="color:#94a3b8;font-size:1.1em">检测到 <span style="color:#ef4444;font-size:1.5em;font-weight:bold">${found.length}</span> 个潜在风险点</h2>`;
  html += `<div class="score ${colorClass}">风险指数: ${score}/100</div>`;
  html += `<p style="color:#94a3b8">风险等级: <strong style="color:${score>=60?'#ef4444':score>=30?'#f59e0b':'#22c55e'}">${level}</strong></p>`;

  if (found.length > 0) {
    html += '<div class="traps">';
    found.forEach(f => {
      html += `<div class="trap"><div class="label">${f.label}</div><div class="text">${f.desc}</div></div>`;
    });
    html += '</div>';
  }

  document.getElementById('resultContent').innerHTML = html;
  document.getElementById('result').style.display = 'block';
  document.getElementById('cta').style.display = 'block';
  document.getElementById('shareBtns').style.display = 'flex';
}

function copyResult() {
  const text = document.getElementById('contract').value.substring(0, 100);
  const resultEl = document.getElementById('result');
  const shareText = `🔍 我用AI检测了一份合同，发现了隐藏风险！\n\n免费检测你的合同：https://affix-ignore-alive.ngrok-free.dev\n\n#AI合同审查 #合同陷阱`;
  navigator.clipboard.writeText(shareText).then(() => {
    alert('已复制！分享到微信/朋友圈，让更多人避免合同陷阱');
  });
}
</script>
</body>
</html>
